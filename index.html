<!-- Schema.org: FAQ -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What is espresso dialling in?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Dialling in is the process of finding the right grind, dose, and yield for a new bag of coffee so the shot lands in your target time with the taste you want. With a new bag you typically need 3-6 shots to settle on a recipe. Brewmie shortcuts that by telling you what to change after every shot."
      }
    },
    {
      "@type": "Question",
      "name": "Why does my espresso taste sour?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sour espresso usually means the shot is under-extracted. The fix is to grind finer so the water spends more time in contact with the coffee. If your shot also ran short on yield, finer grind is the right call. If yield is on target but it still tastes sour, the beans may be too fresh (less than 7 days from roast) and degassing into the puck."
      }
    },
    {
      "@type": "Question",
      "name": "Why does my espresso taste bitter?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Bitter espresso is the opposite signal. The shot is over-extracted. Go coarser on the grind so the water moves faster and pulls less of the bitter late-extraction compounds. If your shot ran long over target, the time delta confirms it."
      }
    },
    {
      "@type": "Question",
      "name": "How is Brewmie different from PuckYeah or BeanConquerer?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "PuckYeah and BeanConquerer are excellent shot trackers. Brewmie is a shot tracker that also tells you what to change, in your grinder's actual units, with a one-line reason. Recommendations update live when you log taste. There is no subscription."
      }
    },
    {
      "@type": "Question",
      "name": "Do I need an internet connection?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. Brewmie works fully offline. Sign-in is optional and only used to sync your shots across devices."
      }
    },
    {
      "@type": "Question",
      "name": "What's the right brew ratio for espresso?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "A traditional espresso is 1:2 (18g in, 36g out) in 25 to 32 seconds. Lighter roasts often pull better at 1:2.5 or 1:3. Brewmie lets you set the target ratio per recipe and tracks how close your actual shot landed."
      }
    },
    {
      "@type": "Question",
      "name": "How fresh should my beans be?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Espresso beans want 7 to 21 days post-roast. Younger than 7 days, they outgas CO2 into the puck and pull long and harsh. Older than 30 days, they lose body and shots run fast and thin. Brewmie shows the roast age on your bean card and adjusts recommendations accordingly."
      }
    },
    {
      "@type": "Question",
      "name": "Does Brewmie work with my grinder?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. The setup wizard lists 25+ grinder brands and over 100 specific models with known setting ranges. Pick yours and recommendations come out in your grinder's actual units, whether that is 0-50 on a Niche Zero, 1-40 on a Baratza Encore, or 0-90 on a 1Zpresso K-Max."
      }
    }
  ]
}
</script>
